name: "Swaply"
description: "A Campus Skill Swapping App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.3.4
  provider: ^6.1.2
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  image_picker: ^1.0.7
  flutter_rating_bar: ^4.0.1
  timeago: ^3.6.1
  shimmer: ^3.0.0
  badges: ^3.1.2
  cached_network_image: ^3.3.1
  uuid: ^4.4.0
  google_generative_ai: ^0.4.7
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/Onboard1.png
    - assets/images/Onboard2.png
    - assets/images/Onboard3.png
    - assets/images/SwaplyLogo.png